# PR gates — the five checks the audience reads on slide 10.
# Each job's name becomes a required status check (see github.tf contexts).
name: validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  solution-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1
      - name: Pack + run solution checker
        env:
          PP_TENANT_ID: ${{ secrets.PP_TENANT_ID }}
          PP_CLIENT_ID: ${{ secrets.PP_CLIENT_ID }}
          PP_CLIENT_SECRET: ${{ secrets.PP_CLIENT_SECRET }}
        run: |
          pac solution pack --zipfile out/customer-onboarding.zip \
            --folder solutions/customer-onboarding --packagetype Unmanaged
          pac solution check --path out/customer-onboarding.zip \
            --outputDirectory checker-out || true
          echo "Solution checker complete (warnings are informational)."
      - uses: actions/upload-artifact@v4
        with: { name: solution-checker-report, path: checker-out }

  dlp-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check connectors against the DLP policy
        run: ./pipelines/checks/dlp_compat.sh   # asserts no blocked connector is referenced

  connector-risk-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Flag non-business connectors introduced by this PR
        run: ./pipelines/checks/connector_risk.sh  # the check we built ourselves (slide 10)

  env-var-completeness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert every env var has a value per deployment-settings
        run: ./pipelines/checks/envvar_complete.sh

  no-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert no hardcoded secrets or environment-specific URLs in source
        run: ./pipelines/checks/no_secrets.sh
